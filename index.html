<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Специально для тебя <3</title>
    <link rel="stylesheet" href="css/main_style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bmo-message-box">
        <div class="back-holder" style="position: absolute; width: 100%; top: 3%">
            <div class="back">У <color-pink>БИМо</color-pink> для тебя сообщение!</div>
        </div>
        <img src="res/img/BMO_message.jpg" alt="BMO_message" width="100%">
        <div class="video-holder" style="position: absolute; width: 100%; top: 21%;">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>
    <div class="music-page">
        <div class="content-wrapper">
            <p>Ну что, дослушала его, <color-pink>клубничка в сахаре</color-pink>?</p>
            <p>Хорошо! Тогда включай эту <color-pink>шикарную</color-pink> подборку и пойдем со мной! Я хочу показать тебе <color-pink>кое-что</color-pink>. Это говорю я, королева вампиров <color-pink>Марселин</color-pink>!</p>
            <audio src="res/mus/Marcy-mus.mp3" id="player">Ой! В твоем браузере нельзя проигрывать песни(((</audio>
            <div class="audio-player">
                <div> 
                    <button class="play" onclick="document.getElementById('player').play()">Play</button> 
                    <button class="pause" onclick="document.getElementById('player').pause()">Pause</button> 
                    <button class="vol-raise" onclick="document.getElementById('player').volume += 0.1">Vol +</button> 
                    <button class="vol-down" onclick="document.getElementById('player').volume -= 0.1">Vol -</button> 
                </div>
            </div>
        </div>
    </div>
</body>
</html>
